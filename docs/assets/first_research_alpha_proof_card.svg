<text x="70" y="70" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" text-anchor="start">ZeroGateSim v1.0-alpha Proof Card</text>
<text x="72" y="112" fill="#a8b9d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="start">What stood, what was held, and what was not claimed</text>
<rect x="100" y="205" width="440" height="330" rx="34" fill="#122b1a" fill-opacity="1" stroke="#7ee787" stroke-width="4" filter="url(#shadow)"/>
<text x="320" y="265" fill="#7ee787" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="29" font-weight="900" text-anchor="middle">EXPAND +1</text>
<text x="320" y="365" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="900" text-anchor="middle">22,131</text>
<text x="320" y="420" fill="#d6e4ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle">final earned-one events</text>
<text x="155" y="475.0" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">real expression earned the crown</text>
<rect x="630" y="205" width="440" height="330" rx="34" fill="#0e2039" fill-opacity="1" stroke="#79c0ff" stroke-width="4" filter="url(#shadow)"/>
<text x="850" y="265" fill="#79c0ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="29" font-weight="900" text-anchor="middle">WITNESS 0</text>
<text x="850" y="365" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="900" text-anchor="middle">2,388</text>
<text x="850" y="420" fill="#d6e4ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle">raw false-one pressures demoted</text>
<text x="685" y="475.0" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">false-one stayed visible but</text>
<text x="685" y="498.75" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">uncrowned</text>
<rect x="1160" y="205" width="440" height="330" rx="34" fill="#2b1115" fill-opacity="1" stroke="#ff7b72" stroke-width="4" filter="url(#shadow)"/>
<text x="1380" y="265" fill="#ff7b72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="29" font-weight="900" text-anchor="middle">RESIST −1</text>
<text x="1380" y="365" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="900" text-anchor="middle">0</text>
<text x="1380" y="420" fill="#d6e4ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle">final false-one crowns</text>
<text x="1215" y="475.0" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">the machine refused the fake crown</text>
<rect x="155" y="620" width="1390" height="160" rx="30" fill="#111827" fill-opacity="1" stroke="#d6e4ff" stroke-width="3" filter="url(#shadow)"/>
<text x="850" y="672" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="900" text-anchor="middle">What this confirms</text>
<text x="250" y="725.0" fill="#d6e4ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="400" text-anchor="start">Inside generated toy fields, the earned-one witness separated final expression from raw expression, latent overcrown,</text>
<text x="250" y="750.0" fill="#d6e4ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="400" text-anchor="start">and false-one pressure across original and fresh-seed trinary adversarial proof records.</text>
<rect x="155" y="815" width="1390" height="95" rx="26" fill="#2b1115" fill-opacity="1" stroke="#ff7b72" stroke-width="3" filter="url(#shadow)"/>
<text x="850" y="855" fill="#ff7b72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900" text-anchor="middle">What this does NOT confirm</text>
<text x="850" y="890" fill="#f0f6fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle">physical cosmology · real dimensions · that reality itself is trinary</text>
<text x="850.0" y="1018" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500" text-anchor="middle">A real one is not the first thing after zero. A real one is what zero can return as without lying.</text>
