<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f3b57" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f7f3ea; }
      .title { font: 700 34px Arial, sans-serif; fill: #172331; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #425466; }
      .box { fill: #ffffff; stroke: #1f3b57; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .box2 { fill: #fdf8ec; stroke: #1f3b57; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .plus { fill: #eef8ef; stroke: #1f7a3d; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .zero { fill: #eef4fb; stroke: #1f5f99; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .minus { fill: #fff0ef; stroke: #a53a32; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .label { font: 700 21px Arial, sans-serif; fill: #172331; }
      .small { font: 400 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #526274; }
      .arrow { stroke: #1f3b57; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .softline { stroke: #8292a1; stroke-width: 2; fill: none; stroke-dasharray: 8 8; }
      .tag { font: 700 16px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="840"/>
  <text x="700" y="56" text-anchor="middle" class="title">ZeroGateSim Public Reader Path</text>
  <text x="700" y="86" text-anchor="middle" class="subtitle">Do not begin with the whole storm. Walk the witness path.</text>

  <rect x="80" y="150" width="330" height="150" class="box"/>
  <text x="245" y="188" text-anchor="middle" class="label">1. Claim Boundary</text>
  <text x="245" y="222" text-anchor="middle" class="small">What is supported?</text>
  <text x="245" y="246" text-anchor="middle" class="small">What is not proven?</text>
  <text x="245" y="274" text-anchor="middle" class="tiny">Start with docs/claim_boundary.md</text>

  <rect x="535" y="150" width="330" height="150" class="box2"/>
  <text x="700" y="188" text-anchor="middle" class="label">2. Mechanism Spine</text>
  <text x="700" y="222" text-anchor="middle" class="small">distinction → polarity → relation → return</text>
  <text x="700" y="246" text-anchor="middle" class="small">raw pressure is not final truth</text>
  <text x="700" y="274" text-anchor="middle" class="tiny">Use zero_gate_cycle.svg</text>

  <rect x="990" y="150" width="330" height="150" class="box"/>
  <text x="1155" y="188" text-anchor="middle" class="label">3. Proof Record</text>
  <text x="1155" y="222" text-anchor="middle" class="small">13,122 seeded toy-field runs</text>
  <text x="1155" y="246" text-anchor="middle" class="small">0 final false-one crowns</text>
  <text x="1155" y="274" text-anchor="middle" class="tiny">Read proof_card.md</text>

  <path d="M410 225 C455 225 490 225 535 225" class="arrow"/>
  <path d="M865 225 C910 225 945 225 990 225" class="arrow"/>

  <rect x="95" y="430" width="310" height="165" class="plus"/>
  <text x="250" y="468" text-anchor="middle" class="label">Expand / +1</text>
  <text x="250" y="503" text-anchor="middle" class="small">Earned-one</text>
  <text x="250" y="527" text-anchor="middle" class="small">final expression</text>
  <text x="250" y="557" text-anchor="middle" class="tiny">Never equal to raw +1 alone</text>

  <rect x="545" y="430" width="310" height="165" class="zero"/>
  <text x="700" y="468" text-anchor="middle" class="label">Witness / 0</text>
  <text x="700" y="503" text-anchor="middle" class="small">latent hold</text>
  <text x="700" y="527" text-anchor="middle" class="small">relation debt / overcrown</text>
  <text x="700" y="557" text-anchor="middle" class="tiny">Zero is structured, not failure</text>

  <rect x="995" y="430" width="310" height="165" class="minus"/>
  <text x="1150" y="468" text-anchor="middle" class="label">Resist / −1</text>
  <text x="1150" y="503" text-anchor="middle" class="small">false-one demotion</text>
  <text x="1150" y="527" text-anchor="middle" class="small">trap containment</text>
  <text x="1150" y="557" text-anchor="middle" class="tiny">The crown is refused</text>

  <path d="M700 300 C700 350 700 385 700 430" class="arrow"/>
  <path d="M700 360 C560 390 410 415 250 430" class="softline"/>
  <path d="M700 360 C840 390 990 415 1150 430" class="softline"/>

  <rect x="180" y="690" width="1040" height="82" class="box2"/>
  <text x="700" y="724" text-anchor="middle" class="label">Public sharing rule</text>
  <text x="700" y="754" text-anchor="middle" class="small">This is simulation-supported speculative software-theory evidence inside generated toy fields, not proof of cosmology or physics.</text>
</svg>