<text x="105" y="930.0" fill="#d6e4ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start">No distinction → fog. No polarity → one-way drift. No relation → isolated peacock. No</text>
