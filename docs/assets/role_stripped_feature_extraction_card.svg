<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Role-stripped feature extraction card</title>
  <desc id="desc">ZeroGateSim v1.6.1 role-stripped feature extraction boundary card.</desc>
  <rect width="1200" height="720" fill="#0b0f14"/>
  <rect x="50" y="46" width="1100" height="628" rx="28" fill="#111821" stroke="#5eead4" stroke-width="3"/>
  <text x="90" y="115" fill="#e5f5f2" font-family="Arial, sans-serif" font-size="42" font-weight="700">v1.6.1-alpha — Role-Stripped Feature Extraction</text>
  <text x="90" y="170" fill="#9ddfd8" font-family="Arial, sans-serif" font-size="25">Feature files first. Targets only after scoring. No role-label shortcut.</text>
  <g font-family="Arial, sans-serif" font-size="26" fill="#e5f5f2">
    <text x="110" y="245">Allowed feature path</text>
    <text x="110" y="285" fill="#cbd5e1">seed-block summaries + ablation summaries</text>
    <text x="110" y="325" fill="#cbd5e1">↓</text>
    <text x="110" y="365" fill="#cbd5e1">role_stripped_profile_features.csv</text>
    <text x="110" y="405" fill="#cbd5e1">role_stripped_family_features.csv</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="26" fill="#e5f5f2">
    <text x="690" y="245">Forbidden feature shortcuts</text>
    <text x="690" y="285" fill="#fecaca">candidate_profile</text>
    <text x="690" y="325" fill="#fecaca">truth_role / role_label</text>
    <text x="690" y="365" fill="#fecaca">trap / expresser / answer_key</text>
  </g>
  <line x1="90" y1="470" x2="1110" y2="470" stroke="#334155" stroke-width="2"/>
  <text x="90" y="525" fill="#e5f5f2" font-family="Arial, sans-serif" font-size="30" font-weight="700">Boundary</text>
  <text x="90" y="570" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="25">Report reader only. No scoring engine. No crowns. Native witness unchanged.</text>
  <text x="90" y="620" fill="#5eead4" font-family="Arial, sans-serif" font-size="28" font-weight="700">C_Z = min(D, P, R, B)</text>
</svg>
