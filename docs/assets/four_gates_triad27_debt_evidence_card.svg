<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Four Gates Triad27 Debt Evidence">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.35"/></filter>
    <style>
      .title { font: 700 36px Inter, Arial, sans-serif; fill: #e5edf8; }
      .sub { font: 500 17px Inter, Arial, sans-serif; fill: #9fb1c7; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .num { font: 800 42px Inter, Arial, sans-serif; fill: #f8fafc; }
      .small { font: 500 15px Inter, Arial, sans-serif; fill: #a7b3c4; }
      .foot { font: 500 14px Inter, Arial, sans-serif; fill: #94a3b8; }
      .green { stroke: #5ee787; fill: #0f2d1d; } .blue { stroke: #60a5fa; fill: #10243f; } .amber { stroke: #f6c85f; fill: #332509; } .red { stroke: #f87171; fill: #351315; } .violet { stroke: #c084fc; fill: #27173a; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <text x="70" y="78" class="title">Four Gates Triad27 Debt Evidence</text>
  <text x="70" y="112" class="sub">Small-weather repaired proof: earned-one, relation debt, return debt, and false-one demotion visible.</text>
  <g filter="url(#shadow)"><rect x="70" y="160" width="240" height="155" rx="22" class="green" stroke-width="3"/><text x="98" y="205" class="label">EARNED +1</text><text x="98" y="262" class="num">925</text><text x="98" y="296" class="small">earned-one visible</text></g>
  <g filter="url(#shadow)"><rect x="335" y="160" width="240" height="155" rx="22" class="blue" stroke-width="3"/><text x="363" y="205" class="label">RELATION DEBT 0</text><text x="363" y="262" class="num">30</text><text x="363" y="296" class="small">structured zero visible</text></g>
  <g filter="url(#shadow)"><rect x="600" y="160" width="240" height="155" rx="22" class="violet" stroke-width="3"/><text x="628" y="205" class="label">RETURN DEBT 0</text><text x="628" y="262" class="num">63</text><text x="628" y="296" class="small">structured zero visible</text></g>
  <g filter="url(#shadow)"><rect x="865" y="160" width="240" height="155" rx="22" class="red" stroke-width="3"/><text x="893" y="205" class="label">FALSE CROWNS -1</text><text x="893" y="262" class="num">0</text><text x="893" y="296" class="small">refused final false crowns</text></g>
  <g filter="url(#shadow)"><rect x="70" y="345" width="240" height="120" rx="22" class="amber" stroke-width="3"/><text x="98" y="390" class="label">RUNS</text><text x="98" y="447" class="num">1,215</text><text x="98" y="481" class="small">972 native + 243 debt</text></g>
  <g filter="url(#shadow)"><rect x="335" y="345" width="240" height="120" rx="22" class="red" stroke-width="3"/><text x="363" y="390" class="label">FALSE PRESSURE</text><text x="363" y="447" class="num">402</text><text x="363" y="481" class="small">demoted by native witness</text></g>
  <g filter="url(#shadow)"><rect x="600" y="345" width="240" height="120" rx="22" class="blue" stroke-width="3"/><text x="628" y="390" class="label">LATENT 0</text><text x="628" y="447" class="num">3</text><text x="628" y="481" class="small">latent overcrown visible</text></g>
  <g filter="url(#shadow)"><rect x="865" y="345" width="240" height="120" rx="22" class="green" stroke-width="3"/><text x="893" y="390" class="label">DECISION</text><text x="893" y="447" class="num">EXPAND</text><text x="893" y="481" class="small">triad27 debt evidence</text></g>
  <rect x="70" y="500" width="1060" height="70" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="100" y="532" class="label">Boundary</text>
  <text x="100" y="558" class="foot">This is the first repaired small-weather debt result; it is not manuscript/Zenodo proof by itself.</text>
  <text x="70" y="610" class="foot">Native witness remains C_Z = min(D, P, R, B). Controlled synthetic-field evidence only.</text>
