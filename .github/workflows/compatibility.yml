name: compatibility-probes

on:
  workflow_dispatch:

jobs:
  legacy-python-probe:
    name: legacy probe (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install probe dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy>=1.24,<3" "matplotlib>=3.7,<4" "pytest>=8,<10"
      - name: Probe import and tests without package install
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -c "import sys, zerogate_sim; print(sys.version); print(zerogate_sim.__version__)"
          python -m compileall src tests -q
          python -m pytest -q
