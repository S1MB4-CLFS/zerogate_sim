name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    name: pytest (release 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Import check
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -c "import sys, zerogate_sim; print(sys.version); print(zerogate_sim.__version__)"
      - name: Test
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -m pytest -q
